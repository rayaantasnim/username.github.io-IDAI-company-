<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>IDAI | Gateway Beyond Intelligence</title>

  <link href="https://googleapis.com" rel="stylesheet">

<style>

/* ===================================
   🌌 GLOBAL COSMIC SYSTEM
=================================== */

html,
body{
  width:100%;
  height:100%;
  margin:0;
  padding:0;
  overflow:hidden;
  background:#000;
}

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

body{
  position:relative;
  font-family:'Poppins',sans-serif;
  color:white;

  background:
  radial-gradient(circle at bottom,#050816 0%,#000 72%);

  transform:translateZ(0);
  backface-visibility:hidden;
  -webkit-font-smoothing:antialiased;
}

/* ===================================
   🌠 COSMIC NEBULA
=================================== */

body::before{
  content:"";
  position:fixed;

  width:260%;
  height:260%;

  top:-80%;
  left:-80%;

  z-index:0;

  background:
  radial-gradient(circle at 20% 20%,rgba(0,255,255,.18),transparent 32%),
  radial-gradient(circle at 80% 25%,rgba(0,140,255,.18),transparent 34%),
  radial-gradient(circle at 50% 85%,rgba(132,0,255,.18),transparent 34%),
  radial-gradient(circle at 55% 45%,rgba(255,255,255,.04),transparent 25%);

  animation:
  nebulaRotate 85s linear infinite,
  nebulaPulse 18s ease-in-out infinite alternate;
}

@keyframes nebulaRotate{

  from{
    transform:rotate(0deg) scale(1);
  }

  to{
    transform:rotate(360deg) scale(1.08);
  }
}

@keyframes nebulaPulse{

  from{
    opacity:.7;
  }

  to{
    opacity:1;
  }
}

/* ===================================
   ⭐ STAR LAYERS
=================================== */

.stars,
.energy{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  pointer-events:none;
}

.stars{
  z-index:1;
}

.energy{
  z-index:2;
}

@keyframes twinkle{

  from{
    opacity:.2;
    transform:scale(.7);
  }

  to{
    opacity:1;
    transform:scale(1.4);
  }
}

@keyframes drift{

  from{
    transform:translateY(0px);
  }

  to{
    transform:translateY(-24px);
  }
}

/* ===================================
   🎬 MAIN INTRO
=================================== */

.intro{
  position:relative;
  z-index:5;

  width:100%;
  min-height:100vh;
  min-height:100dvh;

  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;

  text-align:center;

  padding:clamp(20px,4vw,60px);

  opacity:0;

  animation:introReveal 2.5s ease forwards;
}

@keyframes introReveal{

  to{
    opacity:1;
  }
}

/* ===================================
   🖼 LOGO
=================================== */

.small-logo{

  width:clamp(180px,24vw,310px);
  min-width:50%;
  height:auto;

  object-fit:contain;
  border-radius:24px;

  filter:
  drop-shadow(0 0 20px rgba(0,255,255,.9))
  drop-shadow(0 0 60px rgba(0,255,255,.45))
  drop-shadow(0 0 140px rgba(0,255,255,.28));

  animation:
  logoFloat 8s ease-in-out infinite,
  logoPulse 5s ease-in-out infinite alternate;
}

@keyframes logoFloat{

  0%{
    transform:translateY(0px);
  }

  50%{
    transform:translateY(-20px);
  }

  100%{
    transform:translateY(0px);
  }
}

@keyframes logoPulse{

  from{
    filter:
    drop-shadow(0 0 15px rgba(0,255,255,.7))
    drop-shadow(0 0 45px rgba(0,255,255,.35))
    drop-shadow(0 0 100px rgba(0,255,255,.2));
  }

  to{
    filter:
    drop-shadow(0 0 30px rgba(0,255,255,1))
    drop-shadow(0 0 80px rgba(0,255,255,.7))
    drop-shadow(0 0 180px rgba(0,255,255,.35));
  }
}

/* ===================================
   ✨ ENERGY LINES
=================================== */

.logo{
  margin-top:14px;
}

.logo .line{

  width:190px;
  height:4px;

  margin:12px auto;

  border-radius:999px;

  background:
  linear-gradient(
    90deg,
    transparent,
    #00ffff,
    white,
    #00ffff,
    transparent
  );

  box-shadow:
  0 0 20px #00ffff,
  0 0 60px rgba(0,255,255,.75);

  opacity:0;

  transform:scaleX(0);

  animation:lineReveal 1.8s forwards;
}

.logo .line:nth-child(2){
  animation-delay:.45s;
}

.logo .line:nth-child(3){
  animation-delay:.9s;
}

@keyframes lineReveal{

  to{
    opacity:1;
    transform:scaleX(1);
  }
}

/* ===================================
   🏷 MAIN TITLE
=================================== */

.title{

  font-family:'Orbitron',sans-serif;

  font-size:clamp(24px,3.8vw,48px);

  letter-spacing:clamp(6px,1vw,16px);

  margin-top:18px;
  margin-bottom:18px;

  background:
  linear-gradient(
    90deg,
    #00ffff,
    white,
    #8efcff,
    #00d9ff,
    white,
    #00ffff
  );

  background-size:300%;

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;

  text-shadow:
  0 0 20px rgba(0,255,255,.35);

  opacity:0;

  animation:
  titleReveal 2s forwards 1s,
  titleFlow 8s linear infinite;
}

@keyframes titleReveal{

  to{
    opacity:1;
    transform:translateY(0);
  }
}

@keyframes titleFlow{

  from{
    background-position:0%;
  }

  to{
    background-position:300%;
  }
}

/* ===================================
   📝 INTRODUCTION LINES
=================================== */

.tagline{

  font-family:'Algerian',sans-serif;

  font-size:clamp(14px,2vw,20px);

  line-height:1.8;

  margin:4px 0;

  background:
  linear-gradient(
    270deg,
    #00ffff,
    white,
    #00e1ff
  );

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;

  text-shadow:
  0 0 12px rgba(0,255,255,.22);

  opacity:0;

  transform:translateY(12px);

  animation:
  tagReveal 2s forwards,
  tagFloat 5s ease-in-out infinite;
}

.tagline:nth-of-type(1){
  animation-delay:1.8s;
}

.tagline:nth-of-type(2){
  animation-delay:2.6s;
}

.tagline:nth-of-type(3){
  animation-delay:3.4s;
}

.tagline:nth-of-type(4){
  animation-delay:4.2s;
}

.tagline:nth-of-type(5){
  animation-delay:5s;
}

@keyframes tagReveal{

  to{
    opacity:1;
    transform:translateY(0);
  }
}

@keyframes tagFloat{

  0%{
    transform:translateY(0px);
  }

  50%{
    transform:translateY(-4px);
  }

  100%{
    transform:translateY(0px);
  }
}

/* ===================================
   💥 PARTICLES
=================================== */

.explode{
  position:absolute;

  width:2px;
  height:2px;

  background:white;

  border-radius:50%;

  pointer-events:none;
}

@keyframes explodeAnim{

  0%{
    transform:translate(0,0) scale(1);
    opacity:1;
  }

  100%{
    transform:translate(var(--x),var(--y)) scale(0);
    opacity:0;
  }
}

/* ===================================
   📱 MOBILE
=================================== */

@media (max-width:1100px){

  .small-logo{
    width:clamp(180px,58vw,270px);
  }

  .title{
    font-size:clamp(24px,7vw,38px);
    letter-spacing:4px;
  }

  .tagline{
    font-size:clamp(14px,4.5vw,19px);
  }
}

@media (max-width:600px){

  .logo .line{
    width:125px;
  }
}

/* ===================================
   📱 ADVANCED MOBILE / TABLET OPTIMIZATION
   BELOW 1100px VIEWPORT
=================================== */

@media (max-width:1100px){

  body{
    overflow:hidden;
  }

  /* 🌌 softer nebula scaling */
  body::before{

    width:320%;
    height:320%;

    top:-110%;
    left:-110%;

    animation:
    nebulaRotate 120s linear infinite,
    nebulaPulse 14s ease-in-out infinite alternate;
  }

  /* 🎬 intro spacing */
  .intro{

    justify-content:center;

    padding:
    clamp(24px,6vw,50px)
    clamp(18px,5vw,35px);

    gap:4px;
  }

  /* 🖼 logo responsive cinematic look */
  .small-logo{

    width:clamp(190px,56vw,280px);
    min-width: 60%;
    border-radius:20px;

    filter:
    drop-shadow(0 0 18px rgba(0,255,255,.9))
    drop-shadow(0 0 45px rgba(0,255,255,.45))
    drop-shadow(0 0 120px rgba(0,255,255,.22));
  }

  /* ✨ glowing energy lines */
  .logo{
    margin-top:10px;
  }

  .logo .line{

    width:clamp(120px,35vw,180px);

    height:3px;

    margin:10px auto;

    box-shadow:
    0 0 16px #00ffff,
    0 0 45px rgba(0,255,255,.65);
  }

  /* 🏷 title optimization */
  .title{

    font-size:clamp(24px,7vw,38px);

    letter-spacing:clamp(3px,1vw,7px);

    line-height:1.35;

    margin-top:14px;
    margin-bottom:14px;

    text-shadow:
    0 0 14px rgba(0,255,255,.35),
    0 0 35px rgba(0,255,255,.15);
  }

  /* 📝 tagline readability */
  .tagline{

    width:min(92vw,700px);

    font-size:clamp(14px,3.9vw,18px);

    line-height:1.8;

    letter-spacing:.3px;

    margin:2px auto;

    text-shadow:
    0 0 10px rgba(0,255,255,.18);

    animation:
    tagReveal 1.8s forwards,
    tagFloat 6s ease-in-out infinite;
  }

  /* ⭐ slightly denser cosmic glow */
  .stars div{

    opacity:.95;
  }

}

/* ===================================
   📱 EXTRA SMALL DEVICES
=================================== */

@media (max-width:600px){

  .intro{
    padding:
    22px
    18px;
  }

  .small-logo{
    width:clamp(180px,62vw,240px);
    min-width:70%;
  }

  .title{

    font-size:clamp(22px,8vw,32px);

    letter-spacing:3px;
  }

  .tagline{

    font-size:clamp(13px,4.3vw,16px);

    line-height:1.75;
  }

  .logo .line{
    width:110px;
  }

}

</style>
</head>

<body>

<div class="stars"></div>
<div class="energy"></div>

<div class="intro">

  <!-- Make sure to have 'IDAI-Logo.jpg' in the same folder -->
  <img src="Intro.png" class="small-logo" alt="IDAI Logo">

  <div class="logo">
    <div class="line"></div>
    <div class="line"></div>
    <div class="line"></div>
  </div>

  <p class="tagline">One Universe of Infinite Intelligence.</p>
  <p class="tagline">Beyond Every Imagination.</p>
  <p class="tagline">Innovation Among the Stars.</p>
  <p class="tagline">Powering Humanity Forward.</p>
  <p class="tagline">The Future Begins Here.</p>

</div>

<script>

/* ===================================
   ⭐ STARFIELD GENERATOR
=================================== */

const starContainer=document.querySelector('.stars');

for(let i=0;i<450;i++){

  let s=document.createElement('div');

  let size=Math.random()*2+1;

  s.style.cssText=`
  position:absolute;
  width:${size}px;
  height:${size}px;

  border-radius:50%;
  background:white;

  box-shadow:
  0 0 8px white,
  0 0 18px #00ffff,
  0 0 28px rgba(0,255,255,.7);

  left:${Math.random()*100}vw;
  top:${Math.random()*100}vh;

  animation:
  twinkle ${2+Math.random()*5}s infinite alternate,
  drift ${5+Math.random()*8}s linear infinite alternate;
  `;

  starContainer.appendChild(s);
}

/* ===================================
   💥 BURST PARTICLES
=================================== */

function burst(x,y){

  for(let i=0;i<18;i++){

    let p=document.createElement('div');

    p.className='explode';

    let angle=Math.random()*Math.PI*2;
    let dist=Math.random()*150+50;

    p.style.left=x+'px';
    p.style.top=y+'px';

    p.style.setProperty('--x',Math.cos(angle)*dist+'px');
    p.style.setProperty('--y',Math.sin(angle)*dist+'px');

    p.style.boxShadow=`
    0 0 14px #00ffff,
    0 0 40px rgba(0,255,255,.8)
    `;

    p.style.animation='explodeAnim .8s linear forwards';

    document.body.appendChild(p);

    setTimeout(()=>{
      p.remove();
    },800);
  }
}

/* ===================================
   🚀 SHOOTING STARS
=================================== */

function shootStar(){

  let star=document.createElement('div');

  star.style.cssText=`
  position:absolute;

  width:2px;
  height:2px;

  border-radius:50%;
  background:#00ffff;

  box-shadow:
  0 0 12px #00ffff,
  0 0 35px rgba(0,255,255,.9);
  z-index: 3;
  `;

  let sx=window.innerWidth+120;
  let sy=Math.random()*window.innerHeight;

  let ex=Math.random()*window.innerWidth*.25;
  let ey=Math.random()*window.innerHeight;

  star.style.left=sx+'px';
  star.style.top=sy+'px';

  document.body.appendChild(star);

  let steps=38;
  let i=0;

  let dx=(ex-sx)/steps;
  let dy=(ey-sy)/steps;

  let cx=sx;
  let cy=sy;

  let move=setInterval(()=>{

    cx+=dx;
    cy+=dy;

    i++;

    star.style.left=cx+'px';
    star.style.top=cy+'px';

    burst(cx,cy);

    if(i>=steps){
      clearInterval(move);
      star.remove();
    }

  },22);
}

/* ===================================
   🌠 COSMIC LOOP
=================================== */

setInterval(()=>{
  shootStar();
},450);

/* ===================================
   🚪 AUTO TRANSITION
=================================== */

setTimeout(()=>{

  document.body.style.transition='1.8s ease';
  document.body.style.opacity='0';

  setTimeout(()=>{
    window.location.assign('Home.html');
  },1800);

},14000);

</script>

</body>
</html>
