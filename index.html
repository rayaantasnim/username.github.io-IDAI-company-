<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IDAI Portal - Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* ---------- BODY & BACKGROUND ---------- */

body{
margin:0;
font-family:'Exo 2',sans-serif;
color:white;
background:linear-gradient(180deg,#0a0c1a,#1a1d2c);
position:relative;
min-height:100vh;
overflow-y:auto;
}

/* ---------- STAR FIELD ---------- */

.star{
position:absolute;
background:white;
border-radius:50%;
opacity:0.8;
animation:starMove linear forwards;
}

@keyframes starMove{

0%{
transform:translate(0,0);
opacity:0;
}

10%{
opacity:1;
}

100%{
transform:translate(-120vw,120vh);
opacity:0;
}

}

/* ---------- LOGIN CARD ---------- */

.login-box{
width:450px;
max-width:95%;
margin:80px auto;
padding:50px 40px;
background:rgba(20,25,50,0.9);
border-radius:22px;
border:1px solid rgba(255,255,255,0.15);
box-shadow:
0 0 80px rgba(0,150,255,0.3),
0 0 200px rgba(0,80,255,0.2);
backdrop-filter:blur(12px);
position:relative;
z-index:2;
transition:transform 0.3s ease;
}

.login-box:hover{
transform:scale(1.02);
}

/* ---------- LOGO ---------- */

.logo{
text-align:center;
margin-bottom:25px;
}

.logo img{
width:35%;
height:auto;
margin-top:0px;
object-fit:contain;
filter:drop-shadow(0 0 18px #00d4ff);
animation:pulse 3s infinite;
}

@keyframes pulse{
0%,100%{transform:scale(1);}
50%{transform:scale(1.05);}
}

/* ---------- TITLE ---------- */

.title{
font-family:'Orbitron',sans-serif;
font-size:32px;
text-align:center;
letter-spacing:2px;
background:linear-gradient(90deg,#00d4ff,#7f8cff);
-webkit-background-clip:text;
color:transparent;
}

.tagline{
text-align:center;
font-size:14px;
opacity:0.8;
margin-bottom:35px;
}

/* ---------- FORM ---------- */

.form-control{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.2);
color:white;
transition:all 0.3s;
}

.form-control::placeholder{
color:#cfd8ff;
}

.form-control:focus{
background:rgba(255,255,255,0.08);
border-color:#00c3ff;
box-shadow:0 0 18px rgba(0,200,255,0.7);
color:white;
outline:none;
}

/* ---------- BUTTON ---------- */

.login-btn{
width:100%;
margin-top:15px;
padding:15px;
border:none;
border-radius:14px;
font-family:'Orbitron',sans-serif;
letter-spacing:1px;
background:linear-gradient(135deg,#00c3ff,#004cff);
transition:all 0.3s;
box-shadow:0 0 10px rgba(0,200,255,0.5);
}

.login-btn:hover{
background:linear-gradient(135deg,#33d6ff,#2a6cff);
box-shadow:0 0 25px rgba(0,220,255,0.7);
}

/* ---------- ERROR ---------- */

#errorMsg{
margin-top:15px;
text-align:center;
font-size:14px;
min-height:20px;
padding:12px 15px;
border-radius:10px;
background:rgba(255,107,107,0.25);
color:white;
border:1px solid #ff4d4d;
box-shadow:0 0 16px rgba(255,80,80,0.6);
font-weight:600;
transition:all 0.3s;
}

/* ---------- STAR LAYER ---------- */

.stars-layer{
position:fixed;
top:0;
left:0;
width:100%;
height:200vh;
z-index:0;
overflow:hidden;
}

/* ---------- RESPONSIVE ---------- */

@media (max-width:1100px){

.login-box{
width:90%;
padding:40px 25px;
}

.title{font-size:28px;}
.tagline{font-size:12px;}
.logo img{width:50%;}

}

</style>
</head>

<body>

<div class="stars-layer" id="starsLayer"></div>

<div class="login-box">

<div class="logo">
<img src="IDAI-Logo.jpg" alt="IDAI Logo">
</div>

<div class="title">IDAI PORTAL</div>
<div class="tagline">Inspiring Trust Through Innovation</div>

<form id="loginForm">

<div class="mb-3"><input id="name" type="text" class="form-control" placeholder="Full Name"></div>
<div class="mb-3"><input id="username" type="text" class="form-control" placeholder="Username"></div>
<div class="mb-3"><input id="email" type="email" class="form-control" placeholder="G-mail Address"></div>
<div class="mb-3"><input id="password" type="password" class="form-control" placeholder="Password"></div>
<div class="mb-3"><input id="contact" type="number" class="form-control" placeholder="Contact Number"></div>
<div class="mb-3"><input id="profession" type="text" class="form-control" placeholder="Profession"></div>

<button type="submit" class="login-btn">Explore the Universe</button>

<div id="errorMsg"></div>

</form>

</div>

<script>

/* ---------- COSMIC STAR ENGINE ---------- */

const starsLayer=document.getElementById("starsLayer")

function createStar(){

const star=document.createElement("div")
star.classList.add("star")

const size=Math.random()*3+1
star.style.width=size+"px"
star.style.height=size+"px"

star.style.top=Math.random()*200+"vh"
star.style.left=Math.random()*100+"vw"

star.style.animationDuration=(Math.random()*6+4)+"s"

starsLayer.appendChild(star)

/* remove star after animation */

setTimeout(()=>{
star.remove()
},10000)

}

/* initial star burst */

for(let i=0;i<700;i++){
createStar()
}

/* infinite star generation */

setInterval(()=>{

let burst=Math.random()

let amount

if(burst>0.7){

amount=150

}else if(burst>0.4){

amount=80

}else{

amount=40

}

for(let i=0;i<amount;i++){
createStar()
}

},800)


/* ---------- FORM VALIDATION ---------- */

document.getElementById("loginForm").addEventListener("submit",function(e){

e.preventDefault()

const name=document.getElementById("name").value.trim()
const username=document.getElementById("username").value.trim()
const email=document.getElementById("email").value.trim()
const password=document.getElementById("password").value.trim()
const contact=document.getElementById("contact").value.trim()
const profession=document.getElementById("profession").value.trim()

let error=""

if(!name||!username||!email||!password||!contact||!profession){
error="All fields must be filled!"
}
else if(contact.length!==11||isNaN(contact)){
error="Contact number must be exactly 11 digits!"
}
else if(password.length<9){
error="Password must be more than 8 characters!"
}

const errorDiv=document.getElementById("errorMsg")
errorDiv.innerText=error

if(!error){
window.location.href="opening.html"
}

})

</script>
</body>

</html>
