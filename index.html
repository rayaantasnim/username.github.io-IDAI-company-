<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IDAI: Inspiring Trust through Innovation</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Exo+2:wght@400;600&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
/* ---------- Fonts ---------- */
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Exo+2:wght@500;600&family=Poppins:wght@300;500&display=swap');

/* ---------- Body & Background ---------- */
body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    font-family: 'Poppins', sans-serif;
    color: #fff;
    background: url('background.jpg') no-repeat center center fixed;
    background-size: cover;
    position: relative;
}

/* Elegant gradient overlay */
body::after {
    content: "";
    position: absolute;
    top:0; left:0;
    width:100%; height:100%;
    background: linear-gradient(135deg, rgba(0,0,0,0.7), rgba(0,0,0,0.3));
    z-index: 1;
}

/* ---------- Intro Container ---------- */
.intro {
    position: relative;
    z-index: 2;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    gap: 1rem;
    animation: fadeInContent 2s ease forwards;
}

/* ---------- Logo ---------- */
.small-logo {
    width: 280px;
    height: auto;
    border-radius: 12px;
    box-shadow: 0 0 40px rgba(0,255,255,0.7);
    transition: transform 0.6s ease, box-shadow 0.6s ease;
    animation: logoPulse 4s infinite alternate;
}

/* ---------- Glowing Lines ---------- */
.logo .line {
    width: 130px;
    height: 5px;
    margin: 10px auto;
    background: linear-gradient(90deg, #00eaff, #00ffff);
    border-radius: 3px;
    opacity: 0;
    transform: translateY(20px);
    animation: lineReveal 1s forwards;
    box-shadow: 0 0 20px #00eaff, 0 0 40px #00ffff, 0 0 60px #00ffff;
}
.logo .line:nth-child(2) { animation-delay: 0.3s; }
.logo .line:nth-child(3) { animation-delay: 0.6s; }

/* ---------- Main Title ---------- */
.title {
    font-family: 'Algerian', sans-serif;
    font-weight: 900;
    font-size: 5rem;
    letter-spacing: 12px;
    text-transform: uppercase;
    opacity: 0;
    animation: fadeIn 1.5s forwards, titlePulse 2s infinite 2s;
    text-shadow: 
        0 0 10px #00eaff, 
        0 0 20px #00ffff, 
        0 0 40px #00ffff, 
        0 0 60px #00eaff;
}

/* ---------- Taglines ---------- */
.tagline {
    font-family: 'Exo 2', sans-serif;
    font-weight: 600;
    font-size: 1.4rem;
    letter-spacing: 2px;
    line-height: 1.6;
    opacity: 0;
    animation: fadeIn 2s forwards;
    animation-delay: 1.8s;
    background: linear-gradient(270deg, #00eaff, #00ffff, #00eaff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: gradientShift 3s infinite alternate, fadeIn 2s forwards;
}

/* ---------- Particle Layer ---------- */
.particles {
    position: absolute;
    width: 100%;
    height: 100%;
    z-index: 2;
    overflow: hidden;
}

/* ---------- Animations ---------- */
@keyframes lineReveal {
    to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn { to { opacity: 1; } }
@keyframes pulse {
    0%,100%{text-shadow:0 0 15px #00eaff,0 0 30px #00ffff,0 0 60px #00ffff;}
    50%{text-shadow:0 0 25px #00ffff,0 0 50px #00eaff,0 0 70px #00ffff;}
}
@keyframes fadeInContent {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}
@keyframes logoPulse {
    0% { transform: scale(1) rotate(0deg); box-shadow:0 0 40px rgba(0,255,255,0.7);}
    50% { transform: scale(1.05) rotate(-1deg); box-shadow:0 0 60px rgba(0,255,255,1);}
    100% { transform: scale(1) rotate(0deg); box-shadow:0 0 40px rgba(0,255,255,0.7);}
}
@keyframes titlePulse {
    0%,100% { text-shadow: 0 0 15px #00eaff,0 0 30px #00ffff,0 0 60px #00ffff; }
    50% { text-shadow: 0 0 30px #00ffff,0 0 60px #00eaff,0 0 90px #00ffff; }
}
@keyframes gradientShift {
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* ---------- Responsive ---------- */
@media (max-width: 1100px){
    .small-logo{ width: 35%; }
    .title{ font-size: 3.5rem; letter-spacing: 8px; }
    .tagline{ font-size: 1.15rem; line-height: 1.3;}
}
</style>
</head>

<body>

<div class="particles"></div>

<div class="intro container">
    <img src="logo.png" class="small-logo">
    <div class="logo mb-4">
        <div class="line"></div>
        <div class="line"></div>
        <div class="line"></div>
    </div>
    <h1 class="title">IDAI</h1>
    <p class="tagline">Imagine the Direction of AI</p>
    <p class="tagline">Inspiring Trust Through Innovation</p>
    <p class="tagline">No matter how advanced you can believe AI to be, it's greater still.</p>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
// ---------- Particle System ----------
const particles = document.querySelector(".particles");
const particleCount = 100;

for(let i=0;i<particleCount;i++){
    let p = document.createElement("div");
    p.style.position = "absolute";
    p.style.left = Math.random()*100 + "vw";
    p.style.top = Math.random()*100 + "vh";
    let size = Math.random()*3+1;
    p.style.width = size+"px";
    p.style.height = size+"px";
    p.style.borderRadius="50%";
    p.style.background = "rgba(0,255,255,"+Math.random()+")";
    p.style.animation = `floatParticle ${5+Math.random()*5}s linear infinite`;
    particles.appendChild(p);
}

const style = document.createElement('style');
style.innerHTML = `
@keyframes floatParticle{
    0%{transform: translateY(0);}
    50%{transform: translateY(-20px);}
    100%{transform: translateY(0);}
}`;
document.head.appendChild(style);

// ---------- Auto Redirect ----------
setTimeout(()=>{
    document.body.style.transition="opacity 1s";
    document.body.style.opacity=0;
    setTimeout(()=>{ window.location.href="Home.html"; },1000);
},5000);
</script>

</body>
</html>
