<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDAI Portal - Login</title>

    <link href="https://googleapis.com" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Exo 2', sans-serif;
            color: white;
            background: linear-gradient(180deg, #0a0c1a, #1a1d2c);
            position: relative;
            min-height: 100vh;
            overflow-x: hidden;
            overflow-y: auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }


        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.8;
            animation: starMove linear forwards;
        }

        @keyframes starMove {
            0% { 
                transform: translate(0, 0); 
                opacity: 0; 
            }
            10% { 
                opacity: 1; 
            }
            100% { 
                transform: translate(-120vw, 120vh); 
                opacity: 0; 
            }
        }


        .login-box {
            width: 450px;
            max-width: 95%;
            margin: 40px auto;
            padding: 50px 40px;
            background: rgba(20, 25, 50, 0.9);
            border-radius: 22px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 
                0 0 80px rgba(0, 150, 255, 0.3),
                0 0 200px rgba(0, 80, 255, 0.2);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            position: relative;
            z-index: 2;
            box-sizing: border-box;
            transition: transform 0.3s ease;
        }

        .login-box:hover { 
            transform: scale(1.02); 
        }


        .logo { 
            text-align: center; 
            margin-bottom: 25px; 
        }

        .logo img { 
            width: 35%; 
            height: auto; 
            object-fit: contain; 
            filter: drop-shadow(0 0 18px #00d4ff); 
            animation: pulse 3s infinite; 
        }

        @keyframes pulse { 
            0%, 100% { transform: scale(1); } 
            50% { transform: scale(1.05); } 
        }


        .title {
            font-family: 'Orbitron', sans-serif;
            font-size: 32px;
            text-align: center;
            letter-spacing: 2px;
            background: linear-gradient(90deg, #00d4ff, #7f8cff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 5px;
        }

        .tagline { 
            text-align: center; 
            font-size: 14px; 
            opacity: 0.8; 
            margin-top: 0; 
            margin-bottom: 35px; 
        }

        .input-group { 
            margin-bottom: 16px; 
        }


        .form-control {
            width: 100%;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            color: white;
            font-size: 15px;
            transition: all 0.3s ease;
            box-sizing: border-box;
            outline: none;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: #00c3ff;
            box-shadow: 0 0 18px rgba(0, 200, 255, 0.7);
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }


        .checkbox-container {
            display: flex;
            align-items: center;
            margin-top: 15px;
            margin-bottom: 15px;
            font-size: 13px;
            opacity: 0.9;
            cursor: pointer;
        }

        .checkbox-container input { 
            margin-right: 8px; 
            accent-color: #00c3ff; 
        }


        .btn-flex { 
            display: flex; 
            gap: 12px; 
            margin-top: 10px; 
        }

        .recognize-btn {
            flex: 1; 
            padding: 12px; 
            border: 1px solid #00c3ff; 
            border-radius: 12px;
            font-family: 'Orbitron', sans-serif; 
            font-size: 13px; 
            color: #00c3ff;
            background: transparent; 
            cursor: pointer; 
            transition: all 0.3s ease;
        }

        .recognize-btn:hover { 
            background: rgba(0, 195, 255, 0.15); 
            box-shadow: 0 0 15px rgba(0, 195, 255, 0.4); 
        }

        .login-btn {
            flex: 1.3; 
            padding: 12px; 
            border: none; 
            border-radius: 12px;
            font-family: 'Orbitron', sans-serif; 
            font-size: 14px; 
            color: white;
            background: linear-gradient(135deg, #00c3ff, #004cff); 
            cursor: pointer;
            transition: all 0.3s ease; 
            box-shadow: 0 0 10px rgba(0, 200, 255, 0.4);
        }

        .login-btn:hover { 
            background: linear-gradient(135deg, #33d6ff, #2a6cff); 
            box-shadow: 0 0 25px rgba(0, 220, 255, 0.7); 
        }


        #errorMsg {
            margin-top: 15px; 
            text-align: center; 
            font-size: 14px; 
            padding: 12px 15px;
            border-radius: 10px; 
            font-weight: 600; 
            display: none; 
            box-sizing: border-box;
        }

        .err-style { 
            background: rgba(255, 107, 107, 0.25); 
            color: white; 
            border: 1px solid #ff4d4d; 
            box-shadow: 0 0 16px rgba(255, 80, 80, 0.6); 
        }

        .success-style { 
            background: rgba(46, 204, 113, 0.25); 
            color: white; 
            border: 1px solid #2ecc71; 
            box-shadow: 0 0 16px rgba(46, 204, 113, 0.6); 
        }

        .stars-layer { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 200vh; 
            z-index: 1; 
            overflow: hidden; 
            pointer-events: none; 
        }
    </style>
</head>

<body>

    <div class="stars-layer" id="starsLayer"></div>

    <div class="login-box">
        <div class="logo">
            <img src="IDAI-Logo.jpg" alt="IDAI Logo">
        </div>

        <div class="title">IDAI PORTAL</div>
        <div class="tagline">Inspiring Trust Through Innovation</div>

        <form id="loginForm">
            <div class="input-group"><input id="name" type="text" class="form-control" placeholder="Full Name"></div>
            <div class="input-group"><input id="username" type="text" class="form-control" placeholder="Username"></div>
            <div class="input-group"><input id="email" type="email" class="form-control" placeholder="G-mail Address"></div>
            <div class="input-group"><input id="password" type="password" class="form-control" placeholder="Password"></div>
            <div class="input-group"><input id="contact" type="number" class="form-control" placeholder="Contact Number"></div>
            <div class="input-group"><input id="profession" type="text" class="form-control" placeholder="Profession"></div>

            <label class="checkbox-container">
                <input type="checkbox" id="declarationCheck">
                I hereby declare that all the information provided above is correct.
            </label>

            <div class="btn-flex">
                <button type="button" id="recognizeBtn" class="recognize-btn">Recognize Me</button>
                <button type="submit" class="login-btn">Explore Universe</button>
            </div>
            
            <div id="errorMsg"></div>
        </form>
    </div>

    <script>
        const starsLayer = document.getElementById("starsLayer");
        let starInterval; 

        function createStar() {
            const star = document.createElement("div"); 
            star.classList.add("star");

            const size = Math.random() * 3 + 1; 
            star.style.width = size + "px"; 
            star.style.height = size + "px";

            star.style.top = Math.random() * 200 + "vh"; 
            star.style.left = Math.random() * 100 + "vw";

            const duration = Math.random() * 3 + 2; 
            star.style.animationDuration = duration + "s";

            starsLayer.appendChild(star);

            setTimeout(() => { 
                star.remove(); 
            }, duration * 1000);
        }

        for (let i = 0; i < 1000; i++) { 
            createStar(); 
        }

        starInterval = setInterval(() => {
            let burst = Math.random(); 
            let amount = burst > 0.7 ? 250 : (burst > 0.4 ? 150 : 80);
            
            for (let i = 0; i < amount; i++) { 
                createStar(); 
            }
        }, 500);


        let userDatabase = JSON.parse(localStorage.getItem("idai_user_database")) || [];


        function notifyUser(text, isSuccess) {
            // অ্যালার্ট পপ-আপ এবং এরর মেসেজ বক্স দুটিই একসাথে সক্রিয় করা হয়েছে 
            alert(text);
            const errorDiv = document.getElementById("errorMsg");
            errorDiv.innerText = text; 
            errorDiv.style.display = "block";
            errorDiv.className = isSuccess ? "success-style" : "err-style";
        }


        document.getElementById("recognizeBtn").addEventListener("click", function() {
            const nameInput = document.getElementById("name").value.trim();
            const emailInput = document.getElementById("email").value.trim();

            if (!nameInput || !emailInput) { 
                notifyUser("Please enter your full name and gmail address to recognize.", false); 
                return; 
            }

            const matchedUser = userDatabase.find(u => u.name.toLowerCase() === nameInput.toLowerCase() && u.email.toLowerCase() === emailInput.toLowerCase());
            
            if (matchedUser) {
                document.getElementById("username").value = matchedUser.username;
                document.getElementById("password").value = matchedUser.password;
                document.getElementById("contact").value = matchedUser.contact;
                document.getElementById("profession").value = matchedUser.profession;
                
                // সফল রিকগনিশনে কোনো ব্রাউজার অ্যালার্ট আসবে না, জাস্ট নিচের বক্সে স্ট্যাটাস দেখাবে
                const errorDiv = document.getElementById("errorMsg");
                errorDiv.innerText = "Your profile has been found and verified successfully.";
                errorDiv.style.display = "block";
                errorDiv.className = "success-style";
            } else {
                notifyUser("Your profile was not found in the system registry.", false);
            }
        });


        document.getElementById("loginForm").addEventListener("submit", function(e) {
            e.preventDefault();

            const name = document.getElementById("name").value.trim();
            const username = document.getElementById("username").value.trim();
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value.trim();
            const contact = document.getElementById("contact").value.trim();
            const profession = document.getElementById("profession").value.trim();
            const isChecked = document.getElementById("declarationCheck").checked;

            // কোলন ছাড়া সাধারণ সিঙ্গেল ক্লজের বাক্য
            if (!name || !username || !email || !password || !contact || !profession) { 
                notifyUser("All input fields must be filled completely.", false); 
                return; 
            } 
            if (contact.length !== 11 || isNaN(contact)) { 
                notifyUser("The contact number must contain exactly eleven digits.", false); 
                return; 
            } 
            if (password.length < 9) { 
                notifyUser("The security password must be more than eight characters.", false); 
                return; 
            }
            if (!isChecked) { 
                notifyUser("You must accept the formal declaration check box to proceed.", false); 
                return; 
            }

            const alreadyExists = userDatabase.some(u => u.email.toLowerCase() === email.toLowerCase());
            if(!alreadyExists) {
                userDatabase.push({ name, username, email, password, contact, profession });
                localStorage.setItem("idai_user_database", JSON.stringify(userDatabase));
            }

            clearInterval(starInterval);
            localStorage.setItem("idai_user_name", name);
            localStorage.setItem("idai_is_logged_in", "true");
            
            // সব ঠিক থাকলে কোনো অ্যালার্ট ছাড়াই সরাসরি পেজ পরিবর্তন হবে
            window.location.href = "opening.html";
        });
    </script>
</body>
</html>
